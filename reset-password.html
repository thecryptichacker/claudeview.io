<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password · ClaudeView</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="description" content="Set a new password for your ClaudeView account." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020207;
      --panel: #0a0a18;
      --border: rgba(120, 120, 200, 0.10);
      --border-strong: rgba(140, 140, 220, 0.28);
      --text: #e8ecff;
      --muted: #7b81a8;
      --cyan: #22d3ee;
      --purple: #a855f7;
      --pink: #ec4899;
      --green: #10b981;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0 }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased; line-height: 1.55;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none }

    .bg-layer { position: fixed; inset: 0; z-index: -2; background: #020207 }
    .bg-grid {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(120, 120, 220, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 120, 220, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at 50% 30%, #000 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 30%, #000 30%, transparent 80%);
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(120px);
      opacity: 0.45; pointer-events: none; z-index: -1;
    }
    .orb.cyan { width: 480px; height: 480px; background: radial-gradient(circle, rgba(34,211,238,0.35), transparent 70%); top: -100px; left: -100px }
    .orb.purple { width: 560px; height: 560px; background: radial-gradient(circle, rgba(168,85,247,0.30), transparent 70%); top: 30%; right: -180px }
    .orb.pink { width: 420px; height: 420px; background: radial-gradient(circle, rgba(236,72,153,0.20), transparent 70%); bottom: 5%; left: 30% }

    .topbar {
      padding: 22px 28px;
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1140px; margin: 0 auto;
    }
    .brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; color: #fff }
    .brand-mark {
      width: 30px; height: 30px; border-radius: 8px;
      display: grid; place-items: center; font-size: 14px;
      background: linear-gradient(135deg, rgba(34,211,238,0.18), rgba(168,85,247,0.18));
      border: 1px solid rgba(168,85,247,0.35);
      color: #67e8f9;
    }
    .back-link {
      font-size: 13px; color: var(--muted);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .back-link:hover { color: #fff }

    .container { max-width: 460px; margin: 0 auto; padding: 40px 24px 64px }
    .header { text-align: center; margin-bottom: 28px }
    h1 {
      font-size: 32px; font-weight: 800; letter-spacing: -.02em; line-height: 1.15;
      color: #fff; margin-bottom: 14px;
    }
    h1 .grad {
      background: linear-gradient(90deg, #22d3ee, #a855f7, #ec4899);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .lead { color: var(--muted); font-size: 15px }

    .form-card {
      padding: 28px 26px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(12,12,28,0.92), rgba(6,6,16,0.85));
      border: 1px solid var(--border-strong);
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 80px -30px rgba(168,85,247,0.4);
    }
    .field { margin-bottom: 16px }
    .field label {
      display: block;
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .field input[type=password] {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      background: rgba(6,6,16,0.65);
      border: 1px solid rgba(120,120,200,0.18);
      color: #fff; font-size: 15px;
      font-family: inherit; outline: none;
      transition: border-color .2s, background .2s;
    }
    .field input:focus {
      border-color: rgba(168,85,247,0.55);
      background: rgba(10,10,24,0.85);
    }
    .field input::placeholder { color: #4a4f70 }

    .btn-primary {
      width: 100%;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 15px 24px; border-radius: 12px;
      font-weight: 700; font-size: 15px; color: #020207;
      background: linear-gradient(90deg, #22d3ee 0%, #a855f7 100%);
      border: none; cursor: pointer;
      box-shadow: 0 10px 40px -10px rgba(168,85,247,.7);
      transition: transform .2s, filter .2s, box-shadow .2s;
      font-family: inherit;
      margin-top: 4px;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px); filter: brightness(1.08);
      box-shadow: 0 14px 50px -10px rgba(168,85,247,.85);
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed }

    .alert {
      margin-bottom: 14px;
      padding: 11px 14px; border-radius: 10px;
      font-size: 13px; line-height: 1.5;
    }
    .alert-error {
      background: rgba(239,68,68,0.10);
      border: 1px solid rgba(239,68,68,0.35);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(16,185,129,0.10);
      border: 1px solid rgba(16,185,129,0.35);
      color: #6ee7b7;
    }
    .alert-info {
      background: rgba(34,211,238,0.10);
      border: 1px solid rgba(34,211,238,0.35);
      color: #a5f3fc;
    }

    .footer-links {
      margin-top: 22px; text-align: center;
      font-size: 13px; color: var(--muted);
    }
    .footer-links a { color: #c7cdf5 }
    .footer-links a:hover { color: #fff }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(2,2,7,0.3);
      border-top-color: #020207;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg) } }

    @media (max-width: 560px) {
      h1 { font-size: 26px }
      .container { padding: 24px 18px 48px }
      .form-card { padding: 22px 18px }
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="bg-grid"></div>
  <div class="orb cyan"></div>
  <div class="orb purple"></div>
  <div class="orb pink"></div>

  <div class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">◉</span>
      <span>ClaudeView</span>
    </a>
    <a class="back-link" href="/">← Back to home</a>
  </div>

  <div class="container">
    <div class="header">
      <h1>Set a <span class="grad">new password</span></h1>
      <p class="lead">Pick a strong password — at least 8 characters.</p>
    </div>

    <div class="form-card">
      <div id="alert" style="display:none"></div>

      <form id="reset-form" novalidate>
        <div class="field">
          <label for="password">New password</label>
          <input type="password" id="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters" />
        </div>
        <div class="field">
          <label for="confirm">Confirm new password</label>
          <input type="password" id="confirm" required minlength="8" autocomplete="new-password" placeholder="Re-enter password" />
        </div>

        <button type="submit" id="submit-btn" class="btn-primary" disabled>
          <span id="submit-label">Loading…</span>
        </button>
      </form>
    </div>

    <p class="footer-links">
      <a href="/forgot-password.html">Request a new link</a>
    </p>
  </div>

  <!-- Supabase JS via ESM — only used here to apply the recovery session. -->
  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = window.APP_CONFIG.supabaseUrl;
    const SUPABASE_ANON_KEY = window.APP_CONFIG.supabaseAnonKey;

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: false, detectSessionInUrl: false },
    });

    const form = document.getElementById('reset-form');
    const submitBtn = document.getElementById('submit-btn');
    const submitLabel = document.getElementById('submit-label');
    const alertBox = document.getElementById('alert');
    const pwInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm');

    function showAlert(msg, kind) {
      alertBox.textContent = msg;
      alertBox.className = 'alert ' + (
        kind === 'success' ? 'alert-success' :
        kind === 'info' ? 'alert-info' : 'alert-error'
      );
      alertBox.style.display = 'block';
    }
    function hideAlert() { alertBox.style.display = 'none' }
    function setBusy(busy) {
      submitBtn.disabled = busy;
      submitLabel.innerHTML = busy
        ? '<span class="spinner"></span> Updating…'
        : 'Update Password';
    }

    // Supabase password-recovery flow puts the tokens in the URL fragment:
    //   #access_token=...&refresh_token=...&type=recovery
    // We parse and call setSession() so subsequent updateUser() is authorized.
    async function applyRecoverySession() {
      const hash = window.location.hash.startsWith('#')
        ? window.location.hash.slice(1)
        : window.location.hash;
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const type = params.get('type');
      const errorDesc = params.get('error_description');

      if (errorDesc) {
        showAlert(
          'This reset link is invalid or has expired. Request a new one.',
          'error',
        );
        return false;
      }
      if (!accessToken || !refreshToken || type !== 'recovery') {
        showAlert(
          'Open this page from the reset link in your email. The link in your inbox is required.',
          'info',
        );
        return false;
      }

      const { error } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken,
      });
      if (error) {
        showAlert('This reset link is invalid or has expired. Request a new one.', 'error');
        return false;
      }
      // Clear tokens from the URL so they don't linger in history.
      history.replaceState(null, '', window.location.pathname);
      return true;
    }

    const ready = await applyRecoverySession();
    if (ready) {
      submitBtn.disabled = false;
      submitLabel.textContent = 'Update Password';
    } else {
      submitLabel.textContent = 'Link Required';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const password = pwInput.value;
      const confirm = confirmInput.value;

      if (password.length < 8) {
        showAlert('Password must be at least 8 characters.', 'error');
        return;
      }
      if (password !== confirm) {
        showAlert('Passwords do not match.', 'error');
        return;
      }

      setBusy(true);

      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        showAlert(error.message || "Couldn't update password. Try again.", 'error');
        setBusy(false);
        return;
      }

      showAlert(
        'Password updated. You can now sign in from the ClaudeView app.',
        'success',
      );
      submitBtn.disabled = true;
      submitLabel.textContent = 'Done';

      // Clean up the temporary session so we don't leave one in the browser.
      await supabase.auth.signOut().catch(() => {});
    });
  </script>
</body>
</html>
